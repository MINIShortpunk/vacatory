<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<script>
(function(){
var saved = localStorage.getItem("vacatory-theme");
var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
document.documentElement.dataset.theme = theme;
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">

<title>Vacatory</title>

<meta name="description" content="Research UK law firms, organise applications, track deadlines and stay commercially aware.">

<link rel="stylesheet" href="styles.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

</head>
<body>

<header class="site-header">
<div class="container header-inner">

<a href="#" class="brand">
<svg class="brand-mark" viewBox="0 0 28 28" aria-hidden="true">
<path d="M4 4 L14 24" class="logo-stroke-left" stroke-width="3.4" stroke-linecap="round" fill="none"/>
<path d="M24 4 L14 24" class="logo-stroke-right" stroke-width="3.4" stroke-linecap="round" fill="none"/>
</svg>
<span class="brand-word">acatory</span>
</a>

<nav class="main-nav">
<a href="#firms-section" class="active">Firms</a>
<a href="#">Deadlines</a>
<a href="commercial-awareness.html">Commercial Awareness</a>
<a href="#">Favourites</a>
</nav>

<button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
<svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<circle cx="12" cy="12" r="4"></circle>
<path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
</svg>
<svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
</svg>
</button>

</div>
</header>

<main>

<section class="hero">
<div class="container hero-grid">

<div class="hero-copy">

<h2>Secure your<br>vacation scheme<span class="accent-dot">.</span></h2>

<p class="hero-description">
Research firms, track deadlines, keep your notes. All in one place.
</p>

<div class="hero-search">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hero-search-icon">
<circle cx="11" cy="11" r="7"></circle>
<path d="M20 20L16.65 16.65"></path>
</svg>
<input
id="searchInput"
type="search"
placeholder="Search firms, locations, practice areas…"
autocomplete="off">
</div>

</div>


</div>
</section>

<section class="firms-section" id="firms-section">
<div class="container">

<div class="section-header">
<h2>Featured Firms</h2>
<a href="#" class="see-all">See all
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
<path d="M5 12h14M13 6l6 6-6 6"></path>
</svg>
</a>
</div>

<div class="filter-bar">
<select id="filterPracticeArea" class="filter-select">
<option value="">All practice areas</option>
</select>
<select id="filterRole" class="filter-select">
<option value="">All roles</option>
</select>
<select id="filterFirmType" class="filter-select">
<option value="">All firm types</option>
</select>
<button id="filterReset" class="filter-reset hidden">Clear filters</button>
</div>

<div id="firms" class="firms-grid">
<p class="loading">Loading firms…</p>
</div>

</div>
</section>

</main>

<footer class="site-footer">
<div class="container footer-inner">

<a href="#" class="brand small">
<svg class="brand-mark" viewBox="0 0 28 28" aria-hidden="true">
<path d="M4 4 L14 24" class="logo-stroke-left" stroke-width="3.4" stroke-linecap="round" fill="none"/>
<path d="M24 4 L14 24" class="logo-stroke-right" stroke-width="3.4" stroke-linecap="round" fill="none"/>
</svg>
</a>

<p class="footer-copy">© 2026 Vacatory</p>

<div class="footer-links">
<a href="#">About</a>
<a href="#">Contact</a>
<a href="#">Privacy</a>
</div>

<a href="#" class="footer-social" aria-label="Instagram">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
<rect x="3" y="3" width="18" height="18" rx="5"></rect>
<circle cx="12" cy="12" r="4"></circle>
<circle cx="17.2" cy="6.8" r="1"></circle>
</svg>
</a>

</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="app.js"></script>
<script src="theme.js"></script>

</body>
</html>
