name: Weekly firm rank check

on:
  schedule:
      # Every Monday at 07:00 UTC
          - cron: "0 7 * * 1"
            workflow_dispatch: {}  # lets you trigger it manually from the Actions tab too

            jobs:
              check-rankings:
                  runs-on: ubuntu-latest

                      steps:
                            - name: Checkout repo
                                    uses: actions/checkout@v4

                                          - name: Set up Node
                                                  uses: actions/setup-node@v4
                                                          with:
                                                                    node-version: "20"

                                                                          - name: Run rank check
                                                                                  id: rankcheck
                                                                                          run: |
                                                                                                    OUTPUT=$(node scripts/check-rankings.mjs)
                                                                                                              echo "$OUTPUT"
                                                                                                                        if echo "$OUTPUT" | grep -q "RANK_CHANGES_DETECTED"; then
                                                                                                                                    echo "has_changes=true" >> "$GITHUB_OUTPUT"
                                                                                                                                                # Save everything after the marker line as the issue body
                                                                                                                                                            echo "$OUTPUT" | sed -n '/RANK_CHANGES_DETECTED/,$p' | tail -n +2 > changes.json
                                                                                                                                                                      else
                                                                                                                                                                                  echo "has_changes=false" >> "$GITHUB_OUTPUT"
                                                                                                                                                                                            fi
                                                                                                                                                                                            
                                                                                                                                                                                                  - name: Open issue if ranks changed
                                                                                                                                                                                                          if: steps.rankcheck.outputs.has_changes == 'true'
                                                                                                                                                                                                                  uses: actions/github-script@v7
                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                    script: |
                                                                                                                                                                                                                                                const fs = require('fs');
                                                                                                                                                                                                                                                            const changes = fs.readFileSync('changes.json', 'utf8');
                                                                                                                                                                                                                                                                        const body = [
                                                                                                                                                                                                                                                                                      "The weekly rank check found firms whose position in the public ranking source no longer matches `uk_rank` in Supabase.",
                                                                                                                                                                                                                                                                                                    "",
                                                                                                                                                                                                                                                                                                                  "**This is a proposal, not an automatic change** — the source is a free secondary compilation (The Lawyer's own list is paywalled), so please sanity-check before updating anything.",
                                                                                                                                                                                                                                                                                                                                "",
                                                                                                                                                                                                                                                                                                                                              "```json",
                                                                                                                                                                                                                                                                                                                                                            changes,
                                                                                                                                                                                                                                                                                                                                                                          "```",
                                                                                                                                                                                                                                                                                                                                                                                        "",
                                                                                                                                                                                                                                                                                                                                                                                                      "If these look right, update `uk_rank` for the affected firms in Supabase's Table Editor or SQL Editor."
                                                                                                                                                                                                                                                                                                                                                                                                                  ].join("\n");
                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                              await github.rest.issues.create({
                                                                                                                                                                                                                                                                                                                                                                                                                                            owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                                                          repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        title: `Firm rank changes detected — ${new Date().toISOString().slice(0,10)}`,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      body,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    labels: ["data-check"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
