name: Weekly commercial news scan
on: {schedule: [{cron: "0 6 * * 1"}], workflow_dispatch: {}}
jobs: {scan-news: {runs-on: "ubuntu-latest", steps: [{name: "Check out repo", uses: "actions/checkout@v4"}, {name: "Set up Node", uses: "actions/setup-node@v4", with: {node-version: 20}}, {name: "Install dependencies", working-directory: "scripts", run: "npm install @supabase/supabase-js cheerio playwright"}, {name: "Install Playwright browser", working-directory: "scripts", run: "npx playwright install --with-deps chromium"}, {name: "Run commercial news scan", working-directory: "scripts", env: {SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"}, run: "node check-commercial-news.mjs"}]}}
